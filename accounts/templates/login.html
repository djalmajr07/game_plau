{% extends "base.html" %}

{% block content %}
    <style>
        .form-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background-color: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .form-container h2 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 30px;
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table tr td {
            padding: 12px 0;
        }

        table tr:not(:last-child) td {
            border-bottom: 1px solid #333333;
        }

        label {
            color: #ffffff;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 10px 12px;
            background-color: #2a2a2a;
            border: 1px solid #333333;
            border-radius: 4px;
            color: #ffffff;
            font-size: 14px;
            box-sizing: border-box;
            margin-top: 5px;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus {
            border-color: #0096c7;
            outline: none;
            box-shadow: 0 0 8px rgba(0, 150, 199, 0.3);
        }

        input[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #0096c7;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-top: 20px;
        }

        input[type="submit"]:hover {
            background-color: #32bbe8;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 10px 0;
            color: #ff6b6b;
            font-size: 0.85rem;
        }

        ul li {
            margin-bottom: 5px;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #b0b0b0;
            font-size: 0.9rem;
        }

        .register-link a {
            color: #0096c7;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            color: #32bbe8;
        }
    </style>

    <div class="form-container">
        <h2>Faça Login</h2>
        <form method="post">
            {% csrf_token %}

            <table>
                {{ login_form.as_table }}  
            </table>
            <input type="submit" value="Login"/>
        </form>
        <div class="register-link">
            Novo aqui? <a href="{% url 'register' %}">Crie sua conta</a>
        </div>
    </div>
{% endblock %}
