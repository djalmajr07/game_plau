<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %}</title>
  <style>
    body {
        font-family: 'Open Sans', sans-serif;
        background-color: #0f0f0f;
        color: #ffffff;
        margin: 0;
        padding: 0;
    }

    header {
        background-color: #1a1a1a;
        color: #fff;
        text-align: center;
        border-bottom: 1px solid #333333;
    }

    footer {
        background-color: #1a1a1a;
        color: #b0b0b0;
        padding: 20px;
        text-align: center;
        border-top: 1px solid #333333;
    }

    nav {
        background-color: #1a1a1a;
        color: #fff;
        min-height: 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #333333;
        padding: 0 20px;
        gap: 20px;
    }

    nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        gap: 20px;
    }

    nav ul li {
        margin: 0;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    nav ul li a {
        color: #b0b0b0;
        text-decoration: none;
        font-size: 14px;
        padding: 10px 15px;
        transition: all 0.3s ease;
        border-radius: 4px;
    }

    nav ul li a:hover {
        background-color: #0096c7;
        color: #ffffff;
    }

    nav ul li.active a {
        background-color: #0096c7;
        color: #ffffff;
    }

    nav ul li.active a:hover {
        background-color: #32bbe8;
    }

    .nav-user-section {
        display: flex;
        align-items: center;
        gap: 15px;
        white-space: nowrap;
        margin-left: auto;
    }

    .nav-user-section span {
        color: #b0b0b0;
        font-size: 14px;
    }

    .nav-user-section a {
        color: #b0b0b0;
        text-decoration: none;
        font-size: 14px;
        padding: 8px 15px;
        transition: all 0.3s ease;
        border-radius: 4px;
    }

    .nav-user-section a:hover {
        background-color: #0096c7;
        color: #ffffff;
    }

    button, input[type="submit"] {
        background-color: #0096c7;
        color: #ffffff;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }

    button:hover, input[type="submit"]:hover {
        background-color: #32bbe8;
    }

    a {
        color: #0096c7;
        text-decoration: none;
    }

    a:hover {
        color: #32bbe8;
    }

  </style>
</head>
<body>
  <header>
    <nav>
      <div style="display: flex; align-items: center; gap: 20px;">
        <ul>
          <li><a href="{% url 'game_list' %}">Games</a></li>
          {% if user.is_authenticated %}
          <li><a href="{% url 'new_gameplay' %}">Cadastrar Gameplay</a></li>
          {% endif %}
        </ul>
      </div>
      <div class="nav-user-section">
        {% if user.is_authenticated %}
        <span>Olá, <strong>{{ user.username }}</strong></span>
        <a href="{% url 'logout' %}">Sair</a>
        {% else %}
        <a href="{% url 'register' %}">Cadastrar-se</a>
        <a href="{% url 'login' %}">Login</a>
        {% endif %}
      </div>
    </nav>
  </header>

  <main>
    {% block content %}
    {% endblock %}
  </main>

  <footer>
    <p>&copy; 2025 DJ editions</p>
  </footer>
</body>
</html>
