{% extends "base.html" %}

{% block content %}
<style>
    body { background-color: #121212; color: white; }
    
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 25px;
      margin: 0 auto;
      max-width: 1200px;
      padding: 40px 20px;
      align-items: start; /* Fixes the giant gray space issue */
    }

    .game-card {
      background-color: #1e1e1e;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      border-radius: 8px;
      overflow: hidden;
      text-align: center;
      transition: transform 0.2s ease;
      height: auto;
    }

    .game-card:hover { transform: scale(1.03); }

    .game-cover {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
    }

    .card-body { padding: 15px; }

    .game-card h2 {
      font-size: 1.1rem;
      margin: 0 0 5px 0;
      color: #fff;
    }

    .game-card p {
      font-size: 0.85rem;
      color: #aaa;
      margin: 0;
    }

    form { padding: 20px; text-align: center; }
    input[type="text"] { padding: 10px; border-radius: 4px; border: none; }
    button { background-color: #0096c7; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
</style>

<form method="GET" action="{% url 'game_list' %}">
    <input type="text" name="search" placeholder="Buscar jogo ...">
    <button type="submit">Buscar</button>
</form>

<div class="game-grid">
    {% for game in games %}
    <a href="{% url 'game_detail' game.pk %}" style="text-decoration: none;">
        <div class="game-card">
            {% if game.photo_url %}
                <img class="game-cover" src="{{ game.photo_url }}" alt="{{ game.title }}">
            {% else %}
                <img class="game-cover" src="https://via.placeholder.com/300x450?text=No+Cover" alt="No Cover">
            {% endif %}
            <div class="card-body">
                <h2>{{ game.title }}</h2>
                <p>{{ game.console.name }} {% if game.release_year %}- {{ game.release_year }}{% endif %}</p>
            </div>
        </div>
    </a>
    {% empty %}
    <p style="grid-column: 1/-1; text-align: center;">Nenhum jogo encontrado.</p>
    {% endfor %}
</div>
{% endblock %}
