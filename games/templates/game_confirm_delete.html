{% extends "base.html" %}

{% block content %}
    <style>
        .delete-container {
            max-width: 500px;
            margin: 60px auto;
            padding: 40px;
            background-color: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .delete-container h2 {
            color: #ff6b6b;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .delete-container p {
            color: #b0b0b0;
            font-size: 1.1rem;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .game-info {
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 4px;
            margin: 20px 0 30px 0;
            border-left: 4px solid #ff6b6b;
        }

        .game-info-title {
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 500;
            margin: 0 0 10px 0;
        }

        .game-info-details {
            color: #b0b0b0;
            margin: 5px 0;
            font-size: 0.95rem;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn-delete {
            background-color: #ff6b6b;
            color: #ffffff;
            border: none;
            padding: 12px 40px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.3s ease;
        }

        .btn-delete:hover {
            background-color: #ff5252;
        }

        .btn-cancel {
            background-color: #555555;
            color: #ffffff;
            border: none;
            padding: 12px 40px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .btn-cancel:hover {
            background-color: #777777;
        }

        .warning-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }
    </style>

    <div class="delete-container">
        <div class="warning-icon">⚠️</div>
        <h2>Deletar Jogo</h2>
        <p>Você tem certeza que deseja deletar este jogo? Esta ação <strong>não pode ser desfeita</strong>.</p>

        <div class="game-info">
            <div class="game-info-title">{{ object.title }}</div>
            <div class="game-info-details"><strong>Console:</strong> {{ object.console }}</div>
            <div class="game-info-details"><strong>Ano:</strong> {{ object.release_year|default:"N/A" }}</div>
        </div>

        <form method="post" style="display: inline;">
            {% csrf_token %}
            <div class="button-group">
                <button type="submit" class="btn-delete">Sim, Deletar</button>
                <a href="{% url 'game_detail' object.pk %}" class="btn-cancel">Cancelar</a>
            </div>
        </form>
    </div>
{% endblock %}
