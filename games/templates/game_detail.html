{% extends "base.html" %}

{% block content %}
  <style>
    .game-card {
      background-color: #1a1a1a;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
      border: 1px solid #333333;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
      transition: all 0.3s ease;
      max-width: 500px;
      margin: 20px auto 20px;
    }

    .game-card:hover {
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 150, 199, 0.3);
      transform: translateY(-2px);
      border-color: #0096c7;
    }

    .game-cover {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: #2a2a2a;
    }

    .game-card h2 {
      font-size: 1.5rem;
      margin: 10px;
      color: #ffffff;
    }

    .game-card p {
      font-size: 1rem;
      margin-bottom: 10px;
      color: #b0b0b0;
    }

    .buttons-container {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      margin-bottom: 20px;
    }

    .btn {
      display: inline-block;
      background-color: #0096c7;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s ease-in-out;
      margin: 0 10px;
      text-decoration: none !important;
    }

    .btn:hover {
      background-color: #32bbe8;
    }

    .btn-danger {
      background-color: #d9534f;
      text-decoration: none !important;
    }

    .btn-danger:hover {
      background-color: #ff6b6b;
    }

    .error-message {
      color: #ff6b6b;
      font-size: 14px;
      margin-top: 5px;
    }

    a {
      text-decoration: none !important;
    }
  </style>
  <div class="game-card">
      {% if object.photo %}
        <img class="game-cover" src="{{ object.photo.url }}" alt="{{ object.title }} - {{ object.console }}">
      {% else %}
        <img class="game-cover" src="https://via.placeholder.com/300x450?text=No+Image" alt="{{ object.title }} - {{ object.console }}">
      {% endif %}
      <h2>{{ object.title }}</h2>
      <p><strong>Console:</strong> {{ object.console }}</p>
      <p><strong>Ano de lançamento:</strong> {{ object.release_year }}</p>
  </div>
{% endblock %}
