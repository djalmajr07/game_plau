{% extends "base.html" %}

{% block content %}
<style>
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 25px;
      margin: 0 auto;
      max-width: 1200px;
      padding: 40px 20px;
      align-items: start;
    }

    .game-card {
      background-color: #1a1a1a;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.7);
      border-radius: 8px;
      border: 1px solid #333333;
      overflow: hidden;
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      height: auto;
    }

    .game-card:hover { 
      transform: scale(1.03);
      box-shadow: 0 6px 20px rgba(0, 150, 199, 0.3);
    }

    .game-cover {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: #2a2a2a;
    }

    .card-body { padding: 15px; }

    .game-card h2 {
      font-size: 1.1rem;
      margin: 0 0 5px 0;
      color: #ffffff;
    }

    .game-card p {
      font-size: 0.85rem;
      color: #b0b0b0;
      margin: 0;
    }

    .game-card a {
      color: inherit;
      text-decoration: none;
    }

    form { padding: 20px; text-align: center; }
    input[type="text"] { 
      padding: 10px; 
      border-radius: 4px; 
      border: 1px solid #333333;
      background-color: #2a2a2a;
      color: #ffffff;
    }
    button { 
      background-color: #0096c7; 
      color: white; 
      border: none; 
      padding: 10px 20px; 
      border-radius: 4px; 
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #32bbe8;
    }
</style>

<form method="GET" action="{% url 'game_list' %}">
    <input type="text" name="search" placeholder="Buscar jogo ...">
    <button type="submit">Buscar</button>
</form>

<div class="game-grid">
    {% for game in games %}
    <a href="{% url 'game_detail' game.pk %}" style="text-decoration: none;">
        <div class="game-card">
            {% if game.photo_url %}
                <img class="game-cover" src="{{ game.photo_url }}" alt="{{ game.title }}">
            {% else %}
                <img class="game-cover" src="https://via.placeholder.com/300x450?text=No+Cover" alt="No Cover">
            {% endif %}
            <div class="card-body">
                <h2>{{ game.title }}</h2>
                <p>{{ game.console.name }} {% if game.release_year %}- {{ game.release_year }}{% endif %}</p>
            </div>
        </div>
    </a>
    {% empty %}
    <p style="grid-column: 1/-1; text-align: center;">Nenhum jogo encontrado.</p>
    {% endfor %}
</div>
{% endblock %}
