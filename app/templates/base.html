<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %}</title>
  <style>
    body {
        font-family: 'Open Sans', sans-serif;
        background-color: #0f0f0f;
        color: #ffffff;
        margin: 0;
        padding: 0;
    }

    header {
        background-color: #1a1a1a;
        border-bottom: 1px solid #333333;
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        min-height: 70px;
        padding: 0 20px;
    }

    /* Left Section */
    .nav-links {
        display: flex;
        list-style: none;
        margin: 0;
        padding: 0;
        gap: 10px;
        flex: 1; /* Allows left side to take space */
    }

    .nav-links li a {
        color: #b0b0b0;
        text-decoration: none;
        font-size: 14px;
        padding: 10px 15px;
        transition: all 0.3s ease;
        border-radius: 4px;
        white-space: nowrap;
    }

    .nav-links li a:hover {
        background-color: #0096c7;
        color: #ffffff;
    }

    /* Middle Section (Search) - MATCHING WIDTH LOGIC */
    .nav-search-container {
        flex: 2; /* Gives middle section more priority */
        display: flex;
        justify-content: center;
        max-width: 1200px; /* Match this to your stats/grid max-width */
        margin: 0 20px;
    }

    .nav-search-container form {
        display: flex;
        width: 100%;
        gap: 10px;
    }

    .nav-search-container input[type="text"] {
        flex: 1; 
        padding: 10px 15px;
        border-radius: 4px;
        border: 1px solid #333333;
        background-color: #2a2a2a;
        color: #ffffff;
        font-size: 14px;
        outline: none;
    }

    .nav-search-container input[type="text"]:focus {
        border-color: #0096c7;
    }

    .nav-search-container button {
        background-color: #0096c7;
        color: white;
        border: none;
        padding: 10px 25px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        transition: background-color 0.3s ease;
    }

    .nav-search-container button:hover {
        background-color: #32bbe8;
    }

    /* Right Section */
    .nav-user-section {
        display: flex;
        align-items: center;
        gap: 15px;
        white-space: nowrap;
        flex: 1;
        justify-content: flex-end;
    }

    .nav-user-section span {
        color: #b0b0b0;
        font-size: 14px;
    }

    .nav-user-section a {
        color: #b0b0b0;
        text-decoration: none;
        font-size: 14px;
        padding: 8px 15px;
        transition: all 0.3s ease;
        border-radius: 4px;
    }

    .nav-user-section a:hover {
        background-color: #0096c7;
        color: #ffffff;
    }

    footer {
        background-color: #1a1a1a;
        color: #b0b0b0;
        padding: 20px;
        text-align: center;
        border-top: 1px solid #333333;
        margin-top: 50px;
    }

    @media (max-width: 900px) {
        nav { flex-direction: column; padding: 15px; gap: 15px; }
        .nav-links, .nav-user-section { justify-content: center; }
        .nav-search-container { width: 100%; margin: 0; }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <ul class="nav-links">
        <li><a href="{% url 'game_list' %}">Games</a></li>
        {% if user.is_authenticated %}
        <li><a href="{% url 'new_gameplay' %}">Cadastrar Gameplay</a></li>
        {% endif %}
      </ul>

      <div class="nav-search-container">
        <form method="GET" action="{% url 'game_list' %}">
          {% if active_tab %}<input type="hidden" name="tab" value="{{ active_tab }}">{% endif %}
          <input type="text" name="search" placeholder="Buscar jogo..." value="{{ search_query|default:'' }}">
          <button type="submit">Buscar</button>
        </form>
      </div>

      <div class="nav-user-section">
        {% if user.is_authenticated %}
        <span>Olá, <strong>{{ user.username }}</strong></span>
        <a href="{% url 'logout' %}">Sair</a>
        {% else %}
        <a href="{% url 'register' %}">Cadastrar-se</a>
        <a href="{% url 'login' %}">Login</a>
        {% endif %}
      </div>
    </nav>
  </header>

  <main>
    {% block content %}
    {% endblock %}
  </main>

  <footer>
    <p>&copy; 2026 DJ editions</p>
  </footer>
</body>
</html>
